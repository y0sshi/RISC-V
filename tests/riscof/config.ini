[RISCOF]
ReferencePlugin=spike
ReferencePluginPath=./spike
DUTPlugin=rvcore
DUTPluginPath=./rvcore

[rvcore]
pluginpath=./rvcore
ispec=./rvcore/rvcore_isa.yaml
pspec=./rvcore/rvcore_platform.yaml
target_run=1
jobs=1
# Toolchain prefix (must be on PATH).  Override if your GCC uses a different prefix.
riscv_prefix=riscv64-unknown-elf-

[spike]
pluginpath=./spike
ispec=./rvcore/rvcore_isa.yaml
pspec=./rvcore/rvcore_platform.yaml
jobs=1
riscv_prefix=riscv64-unknown-elf-
# Directory containing the `spike` binary (leave empty if spike is on PATH).
PATH=

# To use Sail instead of Spike, set [RISCOF] ReferencePlugin=sail_cSim /
# ReferencePluginPath=./sail_cSim and provide riscv_sim_RV32/RV64 on PATH.
[sail_cSim]
pluginpath=./sail_cSim
ispec=./rvcore/rvcore_isa.yaml
pspec=./rvcore/rvcore_platform.yaml
jobs=1
# Directory containing riscv_sim_RV32 / riscv_sim_RV64 (empty if on PATH).
PATH=

